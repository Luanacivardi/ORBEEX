<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Gestor de Horas</title>
<script src="config.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #1a1a2e; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; padding: 2.5rem; border-radius: 12px; width: 100%; max-width: 340px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
  h1 { font-size: 18px; color: #1a1a2e; margin-bottom: 1.5rem; text-align: center; }
  input { width: 100%; padding: 12px; border: 1px solid #e2e2ee; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; }
  button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #E8B84B; color: #1a1a2e; font-weight: 700; font-size: 14px; cursor: pointer; }
  button:disabled { opacity: .6; cursor: default; }
  button:hover:not(:disabled) { background: #c99d38; }
  .erro { color: #ef4444; font-size: 13px; margin-bottom: 1rem; text-align: center; }
</style>
</head>
<body>
  <form class="card" id="form-login">
    <h1>🔒 Gestor de Horas</h1>
    <div class="erro" id="erro" style="display:none;"></div>
    <input type="email" id="email" placeholder="E-mail" autofocus required autocomplete="username">
    <input type="password" id="senha" placeholder="Senha" required autocomplete="current-password">
    <button type="submit" id="btn-entrar">Entrar</button>
    <div style="text-align:center;margin-top:14px">
      <a href="#" onclick="abrirRecuperarSenha();return false;" style="font-size:12px;color:#6b6b8a;text-decoration:underline;cursor:pointer">
        Esqueci minha senha
      </a>
    </div>
  </form>

<div id="modal-recuperar-senha" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:12px;max-width:340px;width:90%;padding:24px">
      <h3 style="margin:0 0 6px;font-size:16px;color:#1a1a2e">Recuperar senha</h3>
      <p style="font-size:13px;color:#6b6b8a;margin:0 0 14px">
        Informe seu e-mail cadastrado. Você receberá um link para criar uma nova senha.
      </p>
      <input type="email" id="recuperar-email" placeholder="seu@email.com"
        style="width:100%;padding:10px;border:1px solid #e2e2ee;border-radius:8px;font-size:13px;margin-bottom:12px;box-sizing:border-box">
      <div id="recuperar-msg" style="font-size:12px;margin-bottom:12px"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button type="button" onclick="fecharRecuperarSenha()" style="width:auto;padding:9px 14px;border:1px solid #e2e2ee;background:#fff;color:#1a1a2e;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500">Cancelar</button>
        <button type="button" onclick="enviarRecuperarSenha()" style="width:auto;padding:9px 14px;border:none;background:#E8B84B;color:#1a1a2e;font-weight:700;border-radius:8px;cursor:pointer;font-size:13px">Enviar link</button>
      </div>
    </div>
  </div>

<script>
  var SB_SESSION_KEY = 'sb_session_gestorhoras';

  // Se já tem sessão salva, tenta ir direto para o app
  (function () {
    try {
      var s = JSON.parse(localStorage.getItem(SB_SESSION_KEY) || 'null');
      if (s && s.access_token) window.location.href = 'index.html';
    } catch (e) {}
  })();

  document.getElementById('form-login').addEventListener('submit', function (ev) {
    ev.preventDefault();
    var email = document.getElementById('email').value.trim();
    var senha = document.getElementById('senha').value;
    var erroEl = document.getElementById('erro');
    var btn = document.getElementById('btn-entrar');
    erroEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    fetch(window.SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': window.SUPABASE_ANON_KEY },
      body: JSON.stringify({ email: email, password: senha })
    })
      .then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); })
      .then(function (res) {
        if (!res.ok) {
          throw new Error((res.data && res.data.error_description) || 'E-mail ou senha incorretos.');
        }
        var sessao = {
          access_token: res.data.access_token,
          refresh_token: res.data.refresh_token,
          expires_at: Math.floor(Date.now() / 1000) + (res.data.expires_in || 3600)
        };
        localStorage.setItem(SB_SESSION_KEY, JSON.stringify(sessao));
        window.location.href = 'index.html';
      })
      .catch(function (e) {
        erroEl.textContent = e.message || 'Não foi possível entrar. Verifique e-mail e senha.';
        erroEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
     });
  });

  function abrirRecuperarSenha() {
    document.getElementById('recuperar-msg').textContent = '';
    document.getElementById('recuperar-email').value = document.getElementById('email').value || '';
    document.getElementById('modal-recuperar-senha').style.display = 'flex';
  }
  function fecharRecuperarSenha() {
    document.getElementById('modal-recuperar-senha').style.display = 'none';
  }
  function enviarRecuperarSenha() {
    var email = document.getElementById('recuperar-email').value.trim();
    var msg = document.getElementById('recuperar-msg');
    if (!email) { msg.style.color = '#ef4444'; msg.textContent = 'Informe um e-mail válido.'; return; }

    msg.style.color = '#6b6b8a';
    msg.textContent = 'Enviando...';

    fetch(window.SUPABASE_URL + '/auth/v1/recover?redirect_to=' + encodeURIComponent('https://orbeex.com.br/redefinir-senha.html'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': window.SUPABASE_ANON_KEY },
      body: JSON.stringify({ email: email })
    })
      .then(function (r) {
        if (r.ok) {
          msg.style.color = '#10b981';
          msg.textContent = '✓ Se este e-mail estiver cadastrado, você receberá um link em instantes. Verifique também o spam.';
        } else {
          msg.style.color = '#ef4444';
          msg.textContent = 'Não foi possível enviar. Tente novamente em instantes.';
        }
      })
      .catch(function () {
        msg.style.color = '#ef4444';
        msg.textContent = 'Erro de conexão. Verifique sua internet.';
      });
  }
</script>
</body>
</html>
